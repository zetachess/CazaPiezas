<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#090b10">
    <title>GOBLINAJEDREZ CazaPiezas</title>
    <link rel="stylesheet" href="styles.css?v=8">
  </head>
  <body>
    <main class="game-shell" aria-label="GOBLINAJEDREZ CazaPiezas">
      <header class="hud">
        <div class="brand">
          <img src="assets/goblin-logo.png" alt="">
          <div>
            <p>GOBLINAJEDREZ</p>
            <strong>CazaPiezas</strong>
          </div>
        </div>
        <div class="stats" aria-label="Marcador">
          <span><em aria-hidden="true">♟</em><b id="score">0</b><small>Puntos</small></span>
          <span><em aria-hidden="true">⚡</em><b id="level">1</b><small>Nivel</small></span>
          <span><em aria-hidden="true">🏆</em><b id="best">0</b><small>Record</small></span>
        </div>
      </header>

      <section class="board-wrap">
        <div class="combo-pill" id="comboPill" aria-live="polite">
          <strong id="comboText">x1</strong>
          <span id="comboLabel">Racha</span>
          <i id="comboBar"></i>
        </div>
        <canvas id="game" width="720" height="720" aria-label="Tablero de GOBLINAJEDREZ CazaPiezas"></canvas>
        <div class="overlay" id="overlay">
          <img src="assets/goblin-logo.png" alt="">
          <h1>CazaPiezas</h1>
          <p>Captura piezas. No captures al rey: es jaque mate instantaneo.</p>
          <button id="startButton" type="button">Jugar</button>
        </div>
      </section>

      <footer class="controls" aria-label="Controles tactiles">
        <button type="button" data-dir="up" aria-label="Arriba">&#9650;</button>
        <button type="button" data-dir="left" aria-label="Izquierda">&#9664;</button>
        <button type="button" data-dir="right" aria-label="Derecha">&#9654;</button>
        <button type="button" data-dir="down" aria-label="Abajo">&#9660;</button>
      </footer>
    </main>

    <script src="game.js?v=8"></script>
  </body>
</html>
